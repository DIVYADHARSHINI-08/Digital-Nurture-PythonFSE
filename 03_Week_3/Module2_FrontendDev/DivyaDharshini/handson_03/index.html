<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <script type="module" src="app.js"></script>

    <!-- Header -->
    <header>

        <h2 class="logo">Student Portal</h2>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Courses</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Grades</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <!-- Hero Section -->
        <section id="hero">

            <h1>Welcome to the Student Portal</h1>

            <p>
                Manage your courses, view grades, and track your academic progress.
            </p>

            <button>Explore Courses</button>

        </section>

        <!-- Student Stats -->
        <section class="stats">

            <div class="stat-box">
                <h3>3</h3>
                <p>Courses Enrolled</p>
            </div>

            <div class="stat-box">
                <h3>3.8</h3>
                <p>GPA</p>
            </div>

            <div class="stat-box">
                <h3>6</h3>
                <p>Semester</p>
            </div>

        </section>

        <!-- Courses Section -->

        <section id="courses">

            <h2>Available Courses</h2>

            <!-- Search -->
            <input
                type="text"
                id="search-courses"
                placeholder="Search courses..."
            >

            <!-- Sort Button -->
            <button id="sort-btn">
                Sort by Credits
            </button>

            <!-- Course Cards -->
            <div class="course-grid"></div>

            <!-- Total Credits -->
            <p id="total-credits"></p>

            <!-- Selected Course -->
            <div id="selected-course"></div>

        </section>

    </main>

    <footer>

        <p>&copy; 2026 Student Portal | All Rights Reserved</p>

    </footer>

    <script type="module" src="app.js"></script>

</body>

</html>
