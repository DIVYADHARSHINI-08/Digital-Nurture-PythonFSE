        <header>

    <h1 class="logo">Student Portal</h1>

    <button
        id="menu-btn"
        aria-label="Toggle navigation"
        aria-expanded="false"
        aria-controls="main-nav">
        ☰
    </button>

    <nav id="main-nav" aria-label="Main navigation">
        <ul>
            <li><a href="#" aria-current="page">Home</a></li>
            <li><a href="#">Courses</a></li>
            <li><a href="#">Profile</a></li>
            <li><a href="#">Grades</a></li>
        </ul>
    </nav>

</header>

    <main>

        <!-- Hero Section -->
        <section id="hero">

            <h2>Welcome to the Student Portal</h2>

            <p>
                Manage your courses, view grades, and track your academic progress.
            </p>

            <button>Explore Courses</button>

        </section>

        <!-- Student Stats -->
        <section class="stats">

            <div class="stat-box">
                <h3>3</h3>
                <p>Courses Enrolled</p>
            </div>

            <div class="stat-box">
                <h3>3.8</h3>
                <p>GPA</p>
            </div>

            <div class="stat-box">
                <h3>6</h3>
                <p>Semester</p>
            </div>

        </section>

        <!-- Courses Section -->
        <section id="courses">

            <h2>Available Courses</h2>

            <!-- Search -->
            <label for="search-courses">Search Courses</label>

            <input
                type="text"
                id="search-courses"
                placeholder="Search courses..."
            >

            <!-- Sort Button -->
            <button id="sort-btn">
                Sort by Credits
            </button>

            <p
            id="search-count"
            role="status"
            aria-live="polite"
            >
            0 courses found
            </p>

            <!-- Course Cards -->
            <div class="course-grid"></div>

            <!-- Total Credits -->
            <p id="total-credits"></p>

            <!-- Selected Course -->
            <div id="selected-course"></div>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 Student Portal | All Rights Reserved</p>
    </footer>

    <script type="module" src="app.js"></script>

    <script type="module" src="app.js"></script>

    <!-- css-vars-ponyfill -->
    <script src="https://cdn.jsdelivr.net/npm/css-vars-ponyfill@2"></script>
    <script>
    cssVars();
    </script>
